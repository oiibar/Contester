spring.application.name=contester-backend

# Database configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/contester
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Actuator and Prometheus configuration
management.endpoint.prometheus.enabled=true
# Must match the HTTP server meter name (default: http.server.requests). Renaming the observation
# without mirroring these keys drops histogram buckets — then p95 in Grafana has no _bucket data.
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.minimum-expected-value.http.server.requests=5ms
management.metrics.distribution.maximum-expected-value.http.server.requests=30s
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=prometheus,health,info
spring.jpa.show-sql=true
management.metrics.distribution.sla.http.server.requests=50ms,100ms,200ms,500ms,1s,2s,5s

# Logging and error handling
server.error.include-message=always
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
jwt.expiration-ms=3600000
