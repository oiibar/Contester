global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'spring-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'spring-backend'
          tier: 'backend'
    scrape_interval: 5s

  - job_name: 'nginx-frontend'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          application: 'nginx-frontend'
          tier: 'frontend'
    scrape_interval: 5s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          exporter: 'node'
          tier: 'infrastructure'
    scrape_interval: 15s